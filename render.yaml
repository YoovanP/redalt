services:
  - type: web
    name: redalt-reddit-proxy
    runtime: node
    rootDir: fly-proxy
    plan: free
    buildCommand: npm ci --omit=dev
    startCommand: npm run start
    healthCheckPath: /healthz
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: ENABLE_MIRROR_FALLBACK
        value: "true"
